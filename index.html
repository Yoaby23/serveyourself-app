<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Bienvenido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Animación suave entre pantallas */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md p-6 flex justify-center items-center sticky top-0 z-50 border-b border-slate-100">
        <div class="flex items-center gap-2">
            <img src="logo.png" alt="S" class="w-8 h-8 object-contain">
            <h1 class="text-xl font-black tracking-tighter text-slate-900">serve<span class="text-orange-500">yourself</span></h1>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6 mt-4">
        
        <div id="view-main" class="fade-in text-center">
            <h2 class="text-4xl font-black mb-4 leading-tight text-slate-900">Pide y recoge <br><span class="text-orange-500">sin filas.</span></h2>
            
            <div class="mb-10 rounded-[2.5rem] overflow-hidden shadow-2xl shadow-orange-50 border-4 border-white">
                <img src="welcome-image.png" alt="Comida lista" class="w-full">
            </div>

            <div class="space-y-4">
                <button onclick="switchView('view-login')" class="w-full bg-orange-500 text-white font-black py-5 rounded-[2rem] shadow-xl shadow-orange-100 uppercase tracking-widest active:scale-95 transition-all hover:bg-orange-600">
                    INICIAR SESIÓN
                </button>
                <button onclick="switchView('view-roles')" class="w-full border-2 border-slate-200 text-slate-600 font-bold py-5 rounded-[2rem] hover:border-orange-200 active:scale-95 transition-all uppercase">
                    CREAR CUENTA NUEVA
                </button>
            </div>
        </div>

        <div id="view-login" class="hidden fade-in bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 mt-8">
            <button onclick="switchView('view-main')" class="text-orange-500 font-bold mb-6 hover:text-orange-600">← Volver</button>
            
            <h2 class="text-3xl font-black mb-2 text-slate-900 tracking-tight">Hola de nuevo</h2>
            <p class="text-slate-500 mb-8 font-medium">Ingresa tus datos para continuar.</p>

            <form id="login-form" class="space-y-4">
                <input type="email" id="login-email" placeholder="Correo electrónico" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all font-medium" required>
                <input type="password" id="login-password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all font-medium" required>
                
                <button type="submit" id="btn-login" class="w-full bg-slate-900 text-white font-black py-5 rounded-[2rem] shadow-lg mt-6 uppercase tracking-widest active:scale-95 transition-all">
                    ENTRAR
                </button>
            </form>
        </div>

        <div id="view-roles" class="hidden fade-in mt-8">
            <button onclick="switchView('view-main')" class="text-orange-500 font-bold mb-6 px-2 hover:text-orange-600">← Volver</button>
            
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black mb-2 text-slate-900 tracking-tight">¿Cómo usarás la app?</h2>
                <p class="text-slate-500 font-medium">Elige tu tipo de cuenta.</p>
            </div>

            <div class="space-y-4">
                <a href="registro.html?role=cliente" class="block w-full bg-white p-6 rounded-[2rem] border-2 border-slate-100 hover:border-orange-500 active:scale-95 transition-all text-left shadow-sm">
                    <h3 class="font-black text-xl text-slate-900">Quiero comprar 🍔</h3>
                    <p class="text-slate-500 text-sm mt-1">Explorar restaurantes y hacer pedidos.</p>
                </a>
                
                <a href="registro.html?role=negocio" class="block w-full bg-white p-6 rounded-[2rem] border-2 border-slate-100 hover:border-orange-500 active:scale-95 transition-all text-left shadow-sm">
                    <h3 class="font-black text-xl text-slate-900">Tengo un negocio 🏪</h3>
                    <p class="text-slate-500 text-sm mt-1">Subir mi menú y recibir pedidos.</p>
                </a>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <script>
        function switchView(viewId) {
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-roles').classList.add('hidden');
            
            document.getElementById(viewId).classList.remove('hidden');
        }

        // Lógica real de inicio de sesión
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');

            btn.innerText = "CARGANDO...";

            // 1. Conectar con Supabase Auth
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Error al iniciar sesión: Verifica tus datos.");
                btn.innerText = "ENTRAR";
                return;
            }

            // 2. Obtener el rol de la tabla profiles
            const userId = data.user.id;
            const { data: profileData, error: profileError } = await supabase
                .from('profiles')
                .select('role')
                .eq('id', userId)
                .single();

            if (profileError) {
                console.error("No se pudo obtener el perfil", profileError);
                btn.innerText = "ENTRAR";
                return;
            }

            // 3. Redirigir a la pantalla correcta
            if (profileData.role === 'negocio') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'menu.html';
            }
        });
    </script>
</body>
</html>
