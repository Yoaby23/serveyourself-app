<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(241, 245, 249, 1);
        }

        .input-field {
            @apply w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all duration-200 text-slate-700;
        }

        .btn-primary {
            @apply w-full bg-orange-500 text-white font-extrabold py-5 rounded-[2rem] shadow-xl shadow-orange-100 hover:bg-orange-600 active:scale-[0.98] transition-all uppercase tracking-wider;
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased">

    <nav class="flex items-center justify-between p-6 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
            <img src="logo.png" alt="S" class="w-10 h-10 object-contain drop-shadow-sm">
            <h1 class="text-xl font-black tracking-tighter">serve<span class="text-orange-500">yourself</span></h1>
        </div>
    </nav>

    <main id="main-content" class="max-w-md mx-auto p-6">
        
        <div id="home-screen" class="text-center py-8 animate-slide-up">
            <h2 class="text-4xl font-[800] mb-4 leading-tight tracking-tight text-slate-900">
                Pide y recoge <br><span class="text-orange-500">sin filas.</span>
            </h2>
            <p class="text-slate-500 mb-10 text-lg font-medium">
                Tus pedidos para llevar, listos cuando tú llegues.
            </p>
            
            <div class="mb-10 rounded-[2.5rem] overflow-hidden shadow-2xl shadow-orange-50 border-4 border-white">
                <img src="welcome-image.png" alt="Comida lista" class="w-full">
            </div>

            <div class="space-y-4">
                <button onclick="renderAuth('cliente')" class="btn-primary">
                    SOY CLIENTE
                </button>
                
                <button onclick="renderAuth('negocio')" class="w-full border-2 border-slate-100 text-slate-500 font-bold py-5 rounded-[2rem] hover:border-orange-200 hover:text-orange-500 transition-all">
                    SOY NEGOCIO
                </button>
            </div>
        </div>

    </main>

    <script src="app.js"></script>

</body>
</html>
