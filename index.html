<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Pickup sin filas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        .animate-fade-up {
            animation: fadeUp 0.6s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-white text-slate-900">

    <nav class="flex items-center justify-between p-5 border-b border-slate-50 sticky top-0 bg-white/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
            <img src="logo.png" alt="S" class="logo-container">
            <h1 class="text-xl font-black tracking-tighter">serve<span class="text-orange-500">yourself</span></h1>
        </div>
        <div class="w-10"></div> </nav>

    <main id="main-content" class="max-w-md mx-auto p-6 min-h-[80vh]">
        
        <div class="text-center py-4 animate-fade-up">
            <h2 class="text-4xl font-[900] mb-3 leading-tight tracking-tight text-slate-900">
                Pide y recoge <br><span class="text-orange-500">sin filas.</span>
            </h2>
            <p class="text-slate-500 mb-8 text-lg font-medium">
                Tus pedidos para llevar, listos cuando tú llegues.
            </p>
            
            <div class="mb-10 rounded-[2.5rem] overflow-hidden shadow-2xl shadow-orange-100 border-4 border-white">
                <img src="welcome-image.png" alt="Pedidos para llevar" class="w-full h-auto block">
            </div>

            <div class="grid gap-4 px-2">
                <button onclick="renderAuth('cliente')" 
                    class="w-full bg-orange-500 text-white font-black py-5 rounded-[2rem] shadow-lg shadow-orange-200 hover:bg-orange-600 active:scale-95 transition-all text-lg uppercase tracking-wide">
                    SOY CLIENTE
                </button>
                
                <button onclick="renderAuth('negocio')" 
                    class="w-full border-2 border-slate-100 text-slate-600 font-black py-5 rounded-[2rem] hover:border-orange-500 hover:text-orange-500 active:scale-95 transition-all text-lg uppercase tracking-wide">
                    SOY NEGOCIO
                </button>
            </div>

            <p class="mt-12 text-xs text-slate-300 font-bold uppercase tracking-widest">
                Zapopan, Jalisco • 2026
            </p>
        </div>

    </main>

    <script src="app.js"></script>

</body>
</html>
