<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <main class="max-w-md mx-auto p-6 min-h-screen flex flex-col justify-center">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100">
            <a href="index.html" class="text-orange-500 font-bold mb-6 inline-block hover:text-orange-600 transition-colors">← Volver al inicio</a>
            <h2 id="form-title" class="text-3xl font-black mb-2 text-slate-900 tracking-tight">Registro</h2>
            <p id="form-subtitle" class="text-slate-500 mb-8 font-medium">Crea tu cuenta para continuar.</p>

            <form id="ui-form" class="space-y-4">
                <input type="text" id="reg-name" placeholder="Nombre completo" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all text-sm font-medium" required>
                <input type="email" id="reg-email" placeholder="Correo electrónico" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all text-sm font-medium" required>
                <input type="password" id="reg-password" placeholder="Contraseña (6+ caracteres)" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all text-sm font-medium" required>
                
                <div id="biz-section" class="hidden space-y-4 pt-4 border-t border-slate-100 mt-4">
                    <input type="text" id="biz-name" placeholder="Nombre de tu Negocio" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all text-sm font-medium">
                </div>

                <button type="submit" id="btn-register" class="w-full bg-orange-500 text-white font-black py-5 rounded-[2rem] shadow-lg mt-6 uppercase tracking-widest active:scale-95 transition-all">
                    CREAR MI CUENTA
                </button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // CONFIGURACIÓN DIRECTA (PARA EVITAR ERRORES DE CARGA)
        const SB_URL = 'https://spbgledcjwtqmlqdlpyx.supabase.coss'; // <--- CAMBIA ESTO
        const SB_KEY = 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY';                    // <--- CAMBIA ESTO
        
        // Inicializamos Supabase inmediatamente
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // Lógica de la página
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'cliente';

        if (role === 'negocio') {
            document.getElementById('form-title').innerText = "Tu Negocio";
            document.getElementById('biz-section').classList.remove('hidden');
        }

        document.getElementById('ui-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-register');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const fullName = document.getElementById('reg-name').value;
            const bizName = document.getElementById('biz-name').value;

            try {
                // 1. Registro en Auth
                const { data: authData, error: authErr } = await supabase.auth.signUp({
                    email, password
                });

                if (authErr) throw authErr;

                // 2. Registro en Profiles
                if (authData.user) {
                    const { error: profErr } = await supabase.from('profiles').insert([{
                        id: authData.user.id,
                        full_name: fullName,
                        email: email,
                        role: role,
                        business_name: role === 'negocio' ? bizName : null
                    }]);

                    if (profErr) throw profErr;
                    
                    alert("¡Éxito!");
                    window.location.href = (role === 'negocio') ? 'admin.html' : 'menu.html';
                }
            } catch (err) {
                alert("Error: " + err.message);
                btn.innerText = "CREAR MI CUENTA";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
