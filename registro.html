<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <main class="max-w-md mx-auto p-6 min-h-screen flex flex-col justify-center">
        <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-100">
            <a href="index.html" class="text-orange-500 font-bold mb-6 inline-block hover:opacity-70 transition-all">← Regresar</a>
            <h2 id="form-title" class="text-3xl font-black mb-2 text-slate-900 tracking-tight">Registro</h2>
            <p id="form-subtitle" class="text-slate-500 mb-8 font-medium">Únete a la nueva forma de pedir comida.</p>

            <form id="ui-form" class="space-y-4">
                <input type="text" id="reg-name" placeholder="Nombre completo" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all text-sm font-medium" required>
                <input type="tel" id="reg-phone" placeholder="WhatsApp / Teléfono" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all text-sm font-medium" required>
                <input type="email" id="reg-email" placeholder="Correo electrónico" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all text-sm font-medium" required>
                <input type="password" id="reg-password" placeholder="Contraseña segura" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 focus:bg-white transition-all text-sm font-medium" required>
                
                <div id="biz-section" class="hidden space-y-4 pt-4 border-t border-slate-100 mt-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-1">Configuración del Local</p>
                    <input type="text" id="biz-name" placeholder="Nombre Comercial" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium">
                    <input type="text" id="biz-address" placeholder="Dirección del local" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Abre</label>
                            <input type="time" id="open-time" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Cierra</label>
                            <input type="time" id="close-time" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium">
                        </div>
                    </div>
                    <input type="url" id="biz-logo" placeholder="URL de la Foto del Local" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium">
                </div>

                <button type="submit" id="btn-register" class="w-full bg-orange-500 text-white font-black py-5 rounded-[2rem] shadow-lg shadow-orange-200 mt-6 uppercase tracking-widest active:scale-95 transition-all">
                    COMENZAR AHORA
                </button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://spbgledcjwtqmlqdlpyx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'cliente';

        if (role === 'negocio') {
            document.getElementById('form-title').innerText = "Tu Restaurante";
            document.getElementById('biz-section').classList.remove('hidden');
            document.getElementById('biz-name').required = true;
            document.getElementById('biz-address').required = true;
        }

        document.getElementById('ui-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-register');
            btn.innerText = "REGISTRANDO...";
            btn.disabled = true;

            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            
            try {
                const { data: authData, error: authError } = await _supabase.auth.signUp({ email, password });
                if (authError) throw authError;

                if (authData.user) {
                    const { error: profileError } = await _supabase.from('profiles').insert([{
                        id: authData.user.id,
                        full_name: document.getElementById('reg-name').value,
                        email: email,
                        phone: document.getElementById('reg-phone').value,
                        role: role,
                        business_name: role === 'negocio' ? document.getElementById('biz-name').value : null,
                        address: role === 'negocio' ? document.getElementById('biz-address').value : null,
                        open_time: role === 'negocio' ? document.getElementById('open-time').value : null,
                        close_time: role === 'negocio' ? document.getElementById('close-time').value : null,
                        avatar_url: role === 'negocio' ? (document.getElementById('biz-logo').value || null) : null,
                        rating: 5.0
                    }]);

                    if (profileError) throw profileError;
                    window.location.href = (role === 'negocio') ? 'admin.html' : 'menu.html';
                }
            } catch (error) {
                alert("Error: " + error.message);
                btn.innerText = "COMENZAR AHORA";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
