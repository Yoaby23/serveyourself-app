<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">
    <main class="max-w-md mx-auto p-6 min-h-screen flex flex-col justify-center">
        
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
            <a href="./index.html" class="text-orange-500 font-bold mb-6 inline-block hover:underline">← Volver</a>
            
            <h2 id="form-title" class="text-3xl font-black mb-2 text-slate-900 tracking-tight">INGRESA TU INFORMACION</h2>

            <form id="registro-form" class="space-y-4">
                <input type="text" id="full_name" placeholder="Nombre completo" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 transition-all" required>
                <input type="email" id="email" placeholder="Correo electrónico" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 transition-all" required>
                <input type="password" id="password" placeholder="Contraseña (6+ caracteres)" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 transition-all" required>
                
                <div id="biz-section" class="hidden space-y-4 pt-4 border-t border-slate-100 mt-4">
                    <input type="text" id="biz_name" placeholder="Nombre de tu Negocio" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 transition-all">
                    <input type="text" id="biz_address" placeholder="Dirección del Local" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 transition-all">
                </div>

                <button type="submit" class="w-full bg-orange-500 text-white font-black py-5 rounded-[2rem] shadow-lg mt-6 uppercase tracking-widest active:scale-95 transition-all">
                    CREAR MI CUENTA
                </button>
            </form>
        </div>
    </main>

    <script src="./app.js"></script>
</body>
</html>
