<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Restaurantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="flex justify-between items-center relative max-w-md mx-auto">
            <div class="w-10"></div>
            <h1 class="absolute left-1/2 transform -translate-x-1/2 text-lg font-black tracking-tighter text-slate-900">serve<span class="text-orange-500">yourself</span></h1>
            
            <div class="relative">
                <button onclick="toggleUserMenu()" class="w-10 h-10 bg-slate-100 text-slate-700 hover:bg-orange-100 hover:text-orange-500 rounded-full flex items-center justify-center font-black transition-all">👤</button>
                
                <div id="user-menu" class="hidden absolute top-14 right-0 w-64 bg-white rounded-[2rem] shadow-2xl border border-slate-100 overflow-hidden fade-in-down z-[60]">
                    <div class="p-5 border-b border-slate-50 bg-slate-50/50">
                        <p id="user-name-display" class="text-sm font-black text-slate-900 leading-none">Cargando...</p>
                        <p id="user-role-display" class="text-[10px] font-bold text-orange-500 uppercase tracking-widest mt-1">...</p>
                    </div>
                    
                    <div id="menu-options" class="flex flex-col py-2">
                        </div>

                    <div class="p-2 bg-slate-50 border-t border-slate-100">
                        <button onclick="cerrarSesion()" class="block text-center w-full py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors">Cerrar sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6 mt-2">
        <header>
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Explorar lugares</h2>
            <p class="text-slate-500 text-sm font-medium">¿Qué se te antoja comer hoy?</p>
        </header>

        <section id="lista-restaurantes" class="space-y-4">
            <div class="animate-pulse flex flex-col gap-4">
                <div class="h-32 bg-slate-200 rounded-[2rem]"></div>
                <div class="h-32 bg-slate-200 rounded-[2rem]"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://spbgledcjwtqmlqdlpyx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('hidden'); }

        async function cargarDatosUsuario() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            
            if (profile) {
                document.getElementById('user-name-display').innerText = profile.full_name;
                document.getElementById('user-role-display').innerText = profile.role;
                renderizarOpcionesMenu(profile.role);
            }
        }

        function renderizarOpcionesMenu(role) {
            const container = document.getElementById('menu-options');
            const itemsBase = `<button class="text-left px-6 py-3 text-sm font-bold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-all">👤 Detalles del Perfil</button>`;
            
            if (role === 'negocio') {
                container.innerHTML = itemsBase + `
                    <button class="text-left px-6 py-3 text-sm font-bold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-all">📊 Pedidos Recibidos</button>
                    <button onclick="window.location.href='admin.html'" class="text-left px-6 py-3 text-sm font-bold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-all">🍳 Panel de Control</button>
                `;
            } else {
                container.innerHTML = itemsBase + `
                    <button class="text-left px-6 py-3 text-sm font-bold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-all">🛍️ Mis Pedidos</button>
                    <button class="text-left px-6 py-3 text-sm font-bold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-all">💳 Métodos de Pago</button>
                `;
            }
        }

        async function cargarRestaurantes() {
            const contenedor = document.getElementById('lista-restaurantes');
            const { data: negocios, error } = await _supabase.from('profiles').select('*').eq('role', 'negocio');

            if (error || !negocios) return;
            contenedor.innerHTML = '';
            
            const ahora = new Date();
            const horaActual = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0') + ":00";

            negocios.forEach(restaurante => {
                let estaAbierto = false;
                if (restaurante.open_time && restaurante.close_time) {
                    estaAbierto = horaActual >= restaurante.open_time && horaActual <= restaurante.close_time;
                }

                const card = document.createElement('div');
                card.className = `bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 hover:shadow-xl transition-all cursor-pointer relative group ${!estaAbierto ? 'opacity-70 grayscale-[0.4]' : ''}`;
                
                card.innerHTML = `
                    <div class="flex gap-4 items-center">
                        <div class="relative">
                            ${restaurante.avatar_url 
                                ? `<img src="${restaurante.avatar_url}" class="w-16 h-16 rounded-3xl object-cover shadow-sm border-2 border-white">`
                                : `<div class="w-16 h-16 rounded-3xl bg-slate-100 text-slate-400 flex items-center justify-center text-3xl">🏪</div>`}
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="font-black text-slate-900 text-lg">${restaurante.business_name}</h3>
                                <span class="text-xs font-bold text-amber-600 bg-amber-50 px-2 py-1 rounded-lg">⭐ ${restaurante.rating || '5.0'}</span>
                            </div>
                            <p class="text-slate-400 text-[11px] font-bold uppercase tracking-tight mt-1">📍 ${restaurante.address || 'Sin ubicación'}</p>
                            <div class="flex gap-2 mt-3">
                                <span class="text-[10px] font-black px-3 py-1 rounded-full ${estaAbierto ? 'bg-green-50 text-green-500' : 'bg-red-50 text-red-500'}">
                                    ${estaAbierto ? 'ABIERTO' : 'CERRADO'}
                                </span>
                                <span class="text-[10px] font-black text-slate-400 bg-slate-50 px-3 py-1 rounded-full uppercase tracking-widest">
                                    ${restaurante.open_time?.slice(0,5)} - ${restaurante.close_time?.slice(0,5)}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
                card.onclick = () => { window.location.href = `restaurante.html?id=${restaurante.id}`; };
                contenedor.appendChild(card);
            });
        }

        async function cerrarSesion() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        cargarDatosUsuario();
        cargarRestaurantes();
    </script>
</body>
</html>
