<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Restaurantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="flex justify-between items-center relative max-w-md mx-auto">
            <div class="w-10"></div>
            <h1 class="absolute left-1/2 transform -translate-x-1/2 text-lg font-black tracking-tighter text-slate-900">serve<span class="text-orange-500">yourself</span></h1>
            <div class="relative">
                <button onclick="toggleUserMenu()" class="w-10 h-10 bg-slate-100 text-slate-700 rounded-full flex items-center justify-center font-black">👤</button>
                <div id="user-menu" class="hidden absolute top-14 right-0 w-56 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden fade-in-down">
                    <div class="p-4 border-b border-slate-50 bg-slate-50/50">
                        <p id="user-name-display" class="text-sm font-black text-slate-900 italic">Cargando...</p>
                        <p id="user-email-display" class="text-xs font-medium text-slate-500">...</p>
                    </div>
                    <div class="p-2 bg-slate-50 border-t border-slate-100">
                        <button onclick="cerrarSesion()" class="block text-center w-full py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors">Cerrar sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6 mt-2">
        <header>
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Explorar lugares</h2>
            <p class="text-slate-500 text-sm font-medium">Encuentra tu comida favorita hoy.</p>
        </header>

        <section id="lista-restaurantes" class="space-y-4">
            <div class="animate-pulse flex flex-col gap-4">
                <div class="h-32 bg-slate-200 rounded-[2rem]"></div>
                <div class="h-32 bg-slate-200 rounded-[2rem]"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://spbgledcjwtqmlqdlpyx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('hidden'); }

        async function cargarDatosUsuario() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('user-email-display').innerText = user.email;
            const { data: profile } = await _supabase.from('profiles').select('full_name').eq('id', user.id).single();
            document.getElementById('user-name-display').innerText = profile ? profile.full_name : "Usuario";
        }

        async function cargarRestaurantes() {
            const contenedor = document.getElementById('lista-restaurantes');
            const { data: negocios, error } = await _supabase.from('profiles').select('*').eq('role', 'negocio');

            if (error || !negocios) {
                contenedor.innerHTML = `<p class="text-center text-slate-400 py-10 font-medium">No hay restaurantes disponibles.</p>`;
                return;
            }

            contenedor.innerHTML = '';
            const ahora = new Date();
            const horaActual = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0') + ":00";

            negocios.forEach(restaurante => {
                let estaAbierto = false;
                if (restaurante.open_time && restaurante.close_time) {
                    estaAbierto = horaActual >= restaurante.open_time && horaActual <= restaurante.close_time;
                }

                const card = document.createElement('div');
                card.className = `bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-md transition-all cursor-pointer relative group ${!estaAbierto ? 'opacity-70 grayscale-[0.3]' : ''}`;
                
                card.innerHTML = `
                    <div class="flex gap-4 items-center">
                        ${restaurante.avatar_url 
                            ? `<img src="${restaurante.avatar_url}" class="w-14 h-14 rounded-2xl object-cover">`
                            : `<div class="w-14 h-14 rounded-2xl bg-orange-100 text-orange-500 flex items-center justify-center text-2xl">🏪</div>`}
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="font-black text-slate-900 text-lg">${restaurante.business_name}</h3>
                                <span class="text-xs font-bold text-amber-600">⭐ ${restaurante.rating || '5.0'}</span>
                            </div>
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-tighter mt-1">
                                📍 ${restaurante.address || 'Sin dirección'}
                            </p>
                            <div class="flex gap-2 mt-2">
                                <span class="text-[10px] font-black px-2 py-0.5 rounded-md ${estaAbierto ? 'bg-green-50 text-green-500' : 'bg-red-50 text-red-500'}">
                                    ${estaAbierto ? 'ABIERTO' : 'CERRADO'}
                                </span>
                                <span class="text-[10px] font-black text-slate-400 bg-slate-50 px-2 py-0.5 rounded-md uppercase">
                                    Cierra: ${restaurante.close_time?.slice(0,5) || '--:--'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;

                card.onclick = () => { window.location.href = `restaurante.html?id=${restaurante.id}`; };
                contenedor.appendChild(card);
            });
        }

        async function cerrarSesion() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        cargarDatosUsuario();
        cargarRestaurantes();
    </script>
</body>
</html>
