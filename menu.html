<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Restaurantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="flex justify-between items-center relative max-w-md mx-auto">
            <div class="w-10"></div>
            <div class="absolute left-1/2 transform -translate-x-1/2 flex items-center gap-2">
                <h1 class="text-lg font-black tracking-tighter text-slate-900">serve<span class="text-orange-500">yourself</span></h1>
            </div>

            <div class="relative">
                <button onclick="toggleUserMenu()" class="w-10 h-10 bg-slate-100 text-slate-700 hover:bg-orange-100 hover:text-orange-500 rounded-full flex items-center justify-center font-black transition-colors">👤</button>
                <div id="user-menu" class="hidden absolute top-14 right-0 w-56 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden fade-in-down">
                    <div class="p-4 border-b border-slate-50 bg-slate-50/50">
                        <p id="user-name-display" class="text-sm font-black text-slate-900">Cargando...</p>
                        <p id="user-email-display" class="text-xs font-medium text-slate-500">...</p>
                    </div>
                    <div class="p-2 bg-slate-50 border-t border-slate-100">
                        <button onclick="cerrarSesion()" class="block text-center w-full py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors">Cerrar sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6 mt-2">
        <header>
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Explorar lugares</h2>
            <p class="text-slate-500 text-sm font-medium">Restaurantes disponibles cerca de ti</p>
        </header>

        <section id="lista-restaurantes" class="space-y-4">
            <div class="animate-pulse flex flex-col gap-4">
                <div class="h-32 bg-slate-200 rounded-[2rem]"></div>
                <div class="h-32 bg-slate-200 rounded-[2rem]"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://spbgledcjwtqmlqdlpyx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('hidden'); }

        async function cargarDatosUsuario() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('user-email-display').innerText = user.email;
            
            const { data: profile } = await _supabase.from('profiles').select('full_name').eq('id', user.id).single();
            document.getElementById('user-name-display').innerText = profile ? profile.full_name : "Usuario";
        }

        async function cargarRestaurantes() {
            const contenedor = document.getElementById('lista-restaurantes');
            
            // Traemos nombre, dirección, foto y valoración
            const { data: negocios, error } = await _supabase
                .from('profiles')
                .select('id, business_name, address, avatar_url, rating')
                .eq('role', 'negocio');

            if (error) {
                contenedor.innerHTML = `<p class="text-center text-red-500 font-bold">Error al conectar con la base de datos</p>`;
                return;
            }

            if (!negocios || negocios.length === 0) {
                contenedor.innerHTML = `<p class="text-center text-slate-400 py-10 font-medium italic">No hay restaurantes disponibles en este momento.</p>`;
                return;
            }

            contenedor.innerHTML = ''; 

            negocios.forEach(restaurante => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-md transition-all cursor-pointer relative group overflow-hidden";
                
                // Lógica de imagen: Si no hay avatar_url, ponemos un placeholder con inicial
                const tieneFoto = restaurante.avatar_url && restaurante.avatar_url.trim() !== "";
                const imgHTML = tieneFoto 
                    ? `<img src="${restaurante.avatar_url}" class="w-14 h-14 rounded-2xl object-cover shadow-sm border border-slate-50">`
                    : `<div class="w-14 h-14 rounded-2xl bg-orange-100 text-orange-500 flex items-center justify-center text-2xl shadow-inner">🏪</div>`;

                card.innerHTML = `
                    <div class="flex gap-4 items-center">
                        ${imgHTML}
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="font-black text-slate-900 text-lg leading-tight">${restaurante.business_name}</h3>
                                <div class="flex items-center gap-1 bg-amber-50 border border-amber-100 px-2 py-0.5 rounded-lg">
                                    <span class="text-amber-500 text-xs">⭐</span>
                                    <span class="text-xs font-bold text-amber-700">${restaurante.rating || '5.0'}</span>
                                </div>
                            </div>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-tighter mt-1">
                                📍 ${restaurante.address || 'Dirección no disponible'}
                            </p>
                            <div class="flex gap-2 mt-2">
                                <span class="text-[10px] font-black uppercase tracking-widest text-green-500 bg-green-50 px-2 py-0.5 rounded-md">Abierto</span>
                                <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 bg-slate-50 px-2 py-0.5 rounded-md">🚲 20 min</span>
                            </div>
                        </div>
                    </div>
                    <div class="absolute right-4 bottom-1/2 translate-y-1/2 opacity-0 group-hover:opacity-100 group-hover:right-6 transition-all">
                        <span class="text-orange-500 text-xl font-black">→</span>
                    </div>
                `;

                card.onclick = () => {
                    // Aquí mandaremos al usuario al menú de ese restaurante específico
                    window.location.href = `restaurante.html?id=${restaurante.id}`;
                };

                contenedor.appendChild(card);
            });
        }

        async function cerrarSesion() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        cargarDatosUsuario();
        cargarRestaurantes();
    </script>
</body>
</html>
