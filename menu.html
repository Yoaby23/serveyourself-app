<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Menú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-white/80 backdrop-blur-xl p-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="flex justify-between items-center max-w-md mx-auto relative">
            <button onclick="mostrarSeccion('explorar')" id="btn-back" class="hidden w-10 h-10 flex items-center justify-center text-slate-900 font-bold">←</button>
            <div id="nav-spacer" class="w-10"></div>
            
            <h1 class="absolute left-1/2 transform -translate-x-1/2 text-xl font-black tracking-tighter text-slate-900">
                serve<span class="text-orange-500">yourself</span>
            </h1>
            
            <div class="relative">
                <button onclick="toggleUserMenu()" class="w-10 h-10 bg-slate-100 text-slate-700 hover:bg-orange-500 hover:text-white rounded-full flex items-center justify-center font-black transition-all shadow-sm">👤</button>
                <div id="user-menu" class="hidden absolute top-14 right-0 w-64 bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden fade-in z-[60]">
                    <div class="p-6 border-b border-slate-50 bg-slate-50/50">
                        <p id="user-name-display" class="text-sm font-black text-slate-900 leading-none italic">Cargando...</p>
                        <p id="user-role-display" class="text-[10px] font-bold text-orange-500 uppercase tracking-[0.2em] mt-2">...</p>
                    </div>
                    <div id="menu-options" class="flex flex-col py-3"></div>
                    <div class="p-3 bg-slate-50 border-t border-slate-100">
                        <button onclick="cerrarSesion()" class="w-full py-3 text-sm font-black text-red-500 hover:bg-red-50 rounded-2xl transition-colors uppercase">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-5 mt-2">
        
        <section id="sec-explorar" class="space-y-6">
            <header>
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Explorar</h2>
                <p class="text-slate-400 text-sm font-semibold">¿Qué se te antoja hoy?</p>
            </header>

            <div class="relative group">
                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-orange-500 transition-colors">🔍</span>
                <input type="text" id="search-input" oninput="debounceSearch()" placeholder="Busca comida o restaurantes..." 
                    class="w-full p-5 pl-14 bg-white rounded-[2rem] border-none shadow-xl shadow-slate-200/40 outline-none text-sm font-bold text-slate-900 focus:ring-2 focus:ring-orange-500/20 transition-all">
            </div>

            <div id="lista-restaurantes" class="grid gap-5 pt-2">
                </div>
        </section>

        <section id="sec-perfil" class="hidden space-y-6 fade-in">
            <header>
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Mi Perfil</h2>
                <p class="text-slate-400 text-sm font-semibold">Configura tu cuenta y seguridad.</p>
            </header>
            
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
                <div class="grid grid-cols-1 gap-4 opacity-60">
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Email (No editable)</label>
                        <input type="text" id="edit-email" disabled class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 text-slate-500 font-bold text-sm outline-none cursor-not-allowed">
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Nombre registrado (No editable)</label>
                        <input type="text" id="edit-name" disabled class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 text-slate-500 font-bold text-sm outline-none cursor-not-allowed">
                    </div>
                </div>

                <div class="pt-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Teléfono</label>
                    <input type="tel" id="edit-phone" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold text-sm outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Dirección Principal</label>
                    <input type="text" id="edit-address" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold text-sm outline-none focus:border-orange-500">
                </div>

                <div id="campos-negocio" class="hidden space-y-4 pt-4 border-t border-slate-50">
                    <div class="opacity-60">
                        <label class="text-[9px] font-black text-orange-500 uppercase ml-2">Nombre Comercial</label>
                        <input type="text" id="edit-biz-name" disabled class="w-full p-4 bg-orange-50/30 rounded-2xl border border-orange-100 text-orange-700 font-bold text-sm cursor-not-allowed">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Abre</label>
                            <input type="time" id="edit-open" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Cierra</label>
                            <input type="time" id="edit-close" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold text-sm">
                        </div>
                    </div>
                </div>

                <hr class="border-slate-50 my-2">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Nueva Contraseña</label>
                    <input type="password" id="edit-pass" placeholder="Min. 6 caracteres" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold text-sm outline-none focus:border-orange-500">
                </div>
                <button onclick="actualizarPerfil()" id="btn-update" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs tracking-widest hover:bg-orange-500 transition-all uppercase">Guardar Cambios</button>
            </div>
        </section>

        <section id="sec-pedidos" class="hidden space-y-8 fade-in">
            <header>
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Mis Pedidos</h2>
                <p class="text-slate-400 text-sm font-semibold">Actividad reciente (15 días).</p>
            </header>
            <div id="lista-mis-pedidos" class="space-y-4"></div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://spbgledcjwtqmlqdlpyx.supabase.co', 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY');
        let currentUser = null;
        let userRole = null;
        let searchTimer = null;

        function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('hidden'); }
        
        function mostrarSeccion(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`sec-${id}`).classList.remove('hidden');
            document.getElementById('user-menu').classList.add('hidden');
            const btnBack = document.getElementById('btn-back');
            const spacer = document.getElementById('nav-spacer');
            if(id === 'explorar') { btnBack.classList.add('hidden'); spacer.classList.remove('hidden'); } 
            else { btnBack.classList.remove('hidden'); spacer.classList.add('hidden'); }
            if(id === 'pedidos') cargarHistorialPedidos();
        }

        async function inicializar() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            currentUser = user;
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            if (profile) {
                userRole = profile.role;
                document.getElementById('user-name-display').innerText = profile.full_name;
                document.getElementById('user-role-display').innerText = profile.role;
                document.getElementById('edit-email').value = user.email;
                document.getElementById('edit-name').value = profile.full_name || '';
                document.getElementById('edit-phone').value = profile.phone || '';
                document.getElementById('edit-address').value = profile.address || '';
                if (profile.role === 'negocio') {
                    document.getElementById('campos-negocio').classList.remove('hidden');
                    document.getElementById('edit-biz-name').value = profile.business_name || '';
                    document.getElementById('edit-open').value = profile.open_time || '';
                    document.getElementById('edit-close').value = profile.close_time || '';
                }
                renderMenuOptions(profile.role);
            }
            cargarRestaurantes();
        }

        function renderMenuOptions(role) {
            const container = document.getElementById('menu-options');
            const linkClass = "text-left px-7 py-3.5 text-sm font-bold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-all flex items-center gap-3";
            let html = `<button onclick="mostrarSeccion('perfil')" class="${linkClass}"><span>👤</span> Mi Perfil</button>`;
            if (role === 'negocio') html += `<button onclick="window.location.href='admin.html'" class="${linkClass}"><span>⚙</span> Mi Panel de Control</button>`;
            else html += `<button onclick="mostrarSeccion('pedidos')" class="${linkClass}"><span>🛍</span> Mis Pedidos</button>`;
            container.innerHTML = html;
        }

        // LÓGICA DE BÚSQUEDA
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => ejecutarBusqueda(), 400);
        }

        async function ejecutarBusqueda() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            if (!query) { cargarRestaurantes(); return; }

            // 1. Buscar en perfiles (Negocios)
            const { data: negociosPorNombre } = await _supabase
                .from('profiles')
                .select('*')
                .eq('role', 'negocio')
                .ilike('business_name', `%${query}%`);

            // 2. Buscar en productos
            const { data: productos } = await _supabase
                .from('products')
                .select('restaurant_id')
                .ilike('name', `%${query}%`);

            const idsDesdeProductos = [...new Set(productos?.map(p => p.restaurant_id) || [])];

            // 3. Obtener perfiles de esos productos
            const { data: negociosPorProducto } = idsDesdeProductos.length > 0 
                ? await _supabase.from('profiles').select('*').in('id', idsDesdeProductos)
                : { data: [] };

            // Combinar y eliminar duplicados
            const combinados = [...(negociosPorNombre || []), ...(negociosPorProducto || [])];
            const unicos = Array.from(new Map(combinados.map(item => [item.id, item])).values());

            renderizarLista(unicos);
        }

        async function cargarRestaurantes() {
            const { data: negocios } = await _supabase.from('profiles').select('*').eq('role', 'negocio');
            renderizarLista(negocios || []);
        }

        function renderizarLista(lista) {
            const contenedor = document.getElementById('lista-restaurantes');
            if (lista.length === 0) {
                contenedor.innerHTML = '<p class="text-center py-10 text-slate-400 font-bold italic">No encontramos resultados...</p>';
                return;
            }

            const ahora = new Date();
            const horaActual = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');

            contenedor.innerHTML = lista.map(res => {
                let abierto = true;
                if (res.open_time && res.close_time) {
                    const open = res.open_time.slice(0, 5);
                    const close = res.close_time.slice(0, 5);
                    abierto = open <= close ? (horaActual >= open && horaActual <= close) : (horaActual >= open || horaActual <= close);
                }

                return `
                <div onclick="window.location.href='restaurante.html?id=${res.id}'" class="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all cursor-pointer relative group ${!abierto ? 'opacity-70 grayscale-[0.3]' : ''}">
                    <div class="flex gap-5 items-center">
                        <div class="relative shrink-0">
                            <div class="w-20 h-20 rounded-[1.8rem] bg-orange-50 overflow-hidden shadow-inner flex items-center justify-center">
                                ${res.avatar_url ? `<img src="${res.avatar_url}" class="w-full h-full object-cover">` : '<span class="text-4xl">🏪</span>'}
                            </div>
                            ${abierto ? '<div class="absolute -top-1 -right-1 w-4 h-4 bg-green-500 border-2 border-white rounded-full"></div>' : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start">
                                <h3 class="font-black text-slate-900 text-lg truncate pr-2">${res.business_name}</h3>
                                <div class="flex items-center gap-1 bg-amber-50 px-2 py-1 rounded-xl shrink-0">
                                    <span class="text-amber-500 text-[10px]">⭐</span>
                                    <span class="text-xs font-black text-amber-700">${res.rating || '5.0'}</span>
                                </div>
                            </div>
                            <p class="text-slate-400 text-[11px] font-bold uppercase tracking-tight mt-1 truncate">📍 ${res.address || 'Ubicación Central'}</p>
                            <div class="flex gap-2 mt-3 text-[9px] font-black uppercase tracking-widest">
                                <span class="${abierto ? 'text-green-600 bg-green-100' : 'text-red-600 bg-red-100'} px-3 py-1 rounded-full">${abierto ? 'Abierto' : 'Cerrado'}</span>
                                <span class="bg-slate-100 text-slate-400 px-3 py-1 rounded-full">${res.open_time?.slice(0,5)} - ${res.close_time?.slice(0,5)}</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function actualizarPerfil() {
            const btn = document.getElementById('btn-update');
            const updates = { phone: document.getElementById('edit-phone').value, address: document.getElementById('edit-address').value };
            if(userRole === 'negocio') {
                updates.open_time = document.getElementById('edit-open').value;
                updates.close_time = document.getElementById('edit-close').value;
            }
            btn.disabled = true;
            try {
                await _supabase.from('profiles').update(updates).eq('id', currentUser.id);
                const nuevaPass = document.getElementById('edit-pass').value;
                if (nuevaPass) await _supabase.auth.updateUser({ password: nuevaPass });
                alert("Perfil actualizado!");
                location.reload();
            } catch (err) { alert(err.message); } finally { btn.disabled = false; }
        }

        async function cargarHistorialPedidos() {
            const container = document.getElementById('lista-mis-pedidos');
            container.innerHTML = '<p class="text-center py-10 animate-pulse text-xs font-black text-slate-400 uppercase">Consultando...</p>';
            const fechaLimite = new Date(); fechaLimite.setDate(fechaLimite.getDate() - 15);
            const { data: pedidos } = await _supabase.from('orders').select('*, profiles!orders_restaurant_id_fkey(business_name)').eq('customer_id', currentUser.id).gte('created_at', fechaLimite.toISOString()).order('created_at', { ascending: false });
            if (!pedidos || pedidos.length === 0) { container.innerHTML = '<div class="p-10 text-center text-slate-300 italic text-sm">Sin actividad reciente.</div>'; return; }
            container.innerHTML = pedidos.map(p => `
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <div class="flex justify-between mb-3 items-center">
                        <h4 class="font-black text-slate-900">${p.profiles?.business_name || 'Restaurante'}</h4>
                        <span class="text-[9px] font-black px-2 py-1 bg-slate-50 text-slate-400 rounded-lg">${new Date(p.created_at).toLocaleDateString()}</span>
                    </div>
                    <div class="text-xs font-bold text-slate-500 space-y-1 mb-3">
                        ${p.items.map(i => `<div><span class="text-orange-500">${i.qty}x</span> ${i.nombre}</div>`).join('')}
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-50 pt-3">
                        <span class="text-lg font-black text-slate-900">$${p.total}</span>
                        <span class="text-[9px] font-black uppercase px-3 py-1 rounded-full ${p.status === 'pendiente' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}">${p.status}</span>
                    </div>
                </div>
            `).join('');
        }

        async function cerrarSesion() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        inicializar();
    </script>
</body>
</html>
