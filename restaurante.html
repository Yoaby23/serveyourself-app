<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Menú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .cart-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.9) translateX(-50%); opacity: 0; }
            100% { transform: scale(1) translateX(-50%); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32">

    <nav class="p-4 sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-slate-100">
        <div class="max-w-md mx-auto flex items-center gap-4">
            <a href="menu.html" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-xl hover:bg-slate-200 transition-all">←</a>
            <h1 id="res-name" class="font-black text-slate-900 truncate">Cargando menú...</h1>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-5">
        <div id="res-banner" class="w-full h-44 rounded-[2.5rem] bg-slate-200 mb-8 overflow-hidden relative shadow-inner">
            <img id="res-logo" src="" class="w-full h-full object-cover hidden">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent flex flex-col justify-end p-6">
                <p id="res-address" class="text-white text-[10px] font-black uppercase tracking-[0.2em] opacity-80"></p>
            </div>
        </div>

        <div id="contenedor-menu" class="space-y-10">
            <div class="animate-pulse space-y-4">
                <div class="h-20 bg-slate-200 rounded-3xl"></div>
                <div class="h-20 bg-slate-200 rounded-3xl"></div>
            </div>
        </div>
    </main>

    <div id="cart-bar" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-slate-900 text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center hidden z-50 cart-pop">
        <div class="flex items-center gap-4">
            <div class="relative">
                <span class="bg-orange-500 w-7 h-7 rounded-full flex items-center justify-center font-black text-[11px] shadow-lg shadow-orange-500/40" id="cart-count">0</span>
            </div>
            <div>
                <p class="font-black text-sm">Ver mi pedido</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Listo para ordenar</p>
            </div>
        </div>
        <div class="text-right">
            <span id="cart-total" class="font-black text-xl text-orange-400">$0.00</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://spbgledcjwtqmlqdlpyx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const resId = params.get('id');

        let carrito = [];

        async function cargarPagina() {
            if (!resId) { window.location.href = 'menu.html'; return; }

            // Cargar Info del Restaurante
            const { data: res } = await _supabase.from('profiles').select('*').eq('id', resId).single();
            if (res) {
                document.getElementById('res-name').innerText = res.business_name;
                document.getElementById('res-address').innerText = res.address || 'Ubicación Premium';
                if (res.avatar_url) {
                    const img = document.getElementById('res-logo');
                    img.src = res.avatar_url;
                    img.classList.remove('hidden');
                }
            }

            // Cargar Productos
            const { data: productos } = await _supabase.from('products')
                .select('*')
                .eq('restaurant_id', resId)
                .eq('is_available', true);
            
            renderizarProductos(productos);
        }

        function renderizarProductos(productos) {
            const contenedor = document.getElementById('contenedor-menu');
            if (!productos || productos.length === 0) {
                contenedor.innerHTML = `<div class="text-center py-20"><p class="text-slate-400 font-bold italic">Menú no disponible.</p></div>`;
                return;
            }

            const categorias = {};
            productos.forEach(p => {
                if (!categorias[p.category]) categorias[p.category] = [];
                categorias[p.category].push(p);
            });

            contenedor.innerHTML = '';
            for (const cat in categorias) {
                const section = document.createElement('div');
                section.innerHTML = `
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-5 ml-2">${cat}</h3>
                    <div class="grid gap-4">
                        ${categorias[cat].map(prod => `
                            <div class="bg-white p-4 rounded-[2.2rem] border border-slate-100 flex items-center justify-between shadow-sm">
                                <div class="flex items-center gap-4 flex-1">
                                    ${prod.image_url 
                                        ? `<img src="${prod.image_url}" class="w-16 h-16 rounded-2xl object-cover">` 
                                        : `<div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl">🍽️</div>`}
                                    <div>
                                        <h4 class="font-bold text-slate-900 text-sm leading-tight">${prod.name}</h4>
                                        <p class="text-orange-500 font-black text-sm mt-1">$${parseFloat(prod.price).toFixed(2)}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3 bg-slate-50 p-1.5 rounded-full border border-slate-100">
                                    <button onclick="cambiarCantidad('${prod.id}', -1, '${prod.name}', ${prod.price})" class="w-9 h-9 bg-white text-slate-400 rounded-full flex items-center justify-center font-black shadow-sm hover:text-red-500 transition-all">-</button>
                                    <span id="qty-${prod.id}" class="font-black text-slate-900 text-sm min-w-[20px] text-center">0</span>
                                    <button onclick="cambiarCantidad('${prod.id}', 1, '${prod.name}', ${prod.price})" class="w-9 h-9 bg-slate-900 text-white rounded-full flex items-center justify-center font-black shadow-lg hover:bg-orange-500 transition-all">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                contenedor.appendChild(section);
            }
        }

        function cambiarCantidad(id, cambio, nombre, precio) {
            const precioNum = parseFloat(precio);
            const index = carrito.findIndex(item => item.id === id);
            
            if (index !== -1) {
                carrito[index].qty += cambio;
                if (carrito[index].qty <= 0) {
                    carrito.splice(index, 1);
                }
            } else if (cambio > 0) {
                // Guardamos como 'price' (en inglés) para ser consistentes con la función de actualización
                carrito.push({ id, nombre, price: precioNum, qty: 1 });
            }

            actualizarInterfazCarrito(id);
        }

        function actualizarInterfazCarrito(prodId) {
            const item = carrito.find(i => i.id === prodId);
            const qtyElement = document.getElementById(`qty-${prodId}`);
            if (qtyElement) {
                qtyElement.innerText = item ? item.qty : 0;
            }

            const cartBar = document.getElementById('cart-bar');
            const totalItems = carrito.reduce((acc, item) => acc + item.qty, 0);
            const precioTotal = carrito.reduce((acc, item) => acc + (item.qty * item.price), 0);

            if (totalItems > 0) {
                cartBar.classList.remove('hidden');
                document.getElementById('cart-count').innerText = totalItems;
                document.getElementById('cart-total').innerText = `$${precioTotal.toFixed(2)}`;
            } else {
                cartBar.classList.add('hidden');
            }
        }

        cargarPagina();
    </script>
</body>
</html>
