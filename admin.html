<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="flex justify-between items-center relative max-w-md mx-auto">
            
            <div class="w-10"></div>

            <div class="absolute left-1/2 transform -translate-x-1/2 flex items-center gap-2 cursor-pointer pointer-events-none">
                <h1 class="text-lg font-black tracking-tighter text-slate-900">serve<span class="text-orange-500">yourself</span></h1>
            </div>

            <div class="relative">
                <button onclick="toggleAdminMenu()" class="w-10 h-10 bg-slate-900 text-white rounded-full flex items-center justify-center font-black transition-colors">
                    🏪
                </button>

                <div id="admin-menu" class="hidden absolute top-14 right-0 w-56 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden fade-in-down">
                    <div class="p-4 border-b border-slate-50 bg-slate-50/50">
                        <p class="text-sm font-black text-slate-900">[Nombre del Negocio]</p>
                        <p class="text-xs font-medium text-slate-500">[ID de Administrador]</p>
                    </div>
                    <div class="flex flex-col py-2">
                        <button class="text-left px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors">
                            📦 Pedidos recibidos
                        </button>
                        <button class="text-left px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors">
                            💳 Configuración de pago
                        </button>
                        <button class="text-left px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors">
                            ⚙️ Editar datos del local
                        </button>
                    </div>
                    <div class="p-2 bg-slate-50 border-t border-slate-100">
                        <a href="index.html" class="block text-center w-full py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                            Cerrar sesión
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6 space-y-8">
        
        <div>
            <h2 class="text-2xl font-black text-slate-900">Panel de Control</h2>
            <p class="text-slate-500 text-sm font-medium">Gestiona tu catálogo y pedidos.</p>
        </div>

        <section class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-900 mb-4 flex items-center gap-2 text-sm uppercase tracking-wider">
                <span class="text-orange-500 font-black">+</span> Añadir Producto
            </h3>
            <form class="space-y-4">
                <input type="text" placeholder="Nombre del producto" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium">
                
                <div class="flex gap-4">
                    <input type="number" placeholder="Precio" class="w-2/3 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium">
                    <div class="w-1/3 p-4 bg-slate-100 text-slate-400 rounded-2xl text-center font-bold text-xs flex items-center justify-center">
                        MXN
                    </div>
                </div>

                <input type="text" placeholder="URL de la imagen" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium">
                
                <button type="button" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-md uppercase text-xs tracking-widest hover:bg-slate-800 transition-all">
                    Guardar en Menú
                </button>
            </form>
        </section>

        <section>
            <h3 class="font-bold text-slate-900 mb-4 px-2 text-sm uppercase tracking-wider">Mi Menú Activo</h3>
            
            <div id="lista-menu-admin" class="space-y-4">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex gap-4 items-center">
                    <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-300 shrink-0">
                        📷
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-900 text-sm leading-tight">[Producto]</h4>
                        <p class="text-orange-500 font-black text-sm mt-1">$0.00</p>
                    </div>
                    <button class="w-8 h-8 rounded-full bg-red-50 text-red-400 font-bold flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                        ×
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        function toggleAdminMenu() {
            const menu = document.getElementById('admin-menu');
            menu.classList.toggle('hidden');
        }

        document.addEventListener('click', function(event) {
            const menu = document.getElementById('admin-menu');
            const button = event.target.closest('button[onclick="toggleAdminMenu()"]');
            
            if (!button && !menu.contains(event.target) && !menu.classList.contains('hidden')) {
                menu.classList.add('hidden');
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="supabase-config.js"></script>

</body>
</html>
