<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Mi Negocio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-white p-4 border-b border-slate-100 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <img src="logo.png" alt="S" class="w-8 h-8 object-contain">
            <h1 class="text-lg font-black tracking-tighter text-slate-900">serve<span class="text-orange-500">yourself</span></h1>
        </div>
        <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 font-bold border-2 border-white shadow-sm">
            N
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6 space-y-8">
        
        <div>
            <h2 class="text-2xl font-black text-slate-900">Panel de Control</h2>
            <p class="text-slate-500">Administra tu menú y recibe pedidos.</p>
        </div>

        <section class="bg-white p-6 rounded-[2rem] shadow-lg shadow-slate-200/50 border border-slate-100">
            <h3 class="font-bold text-slate-900 mb-4 flex items-center gap-2">
                <span class="text-orange-500 text-xl">+</span> Añadir Producto
            </h3>
            <form class="space-y-4">
                <input type="text" placeholder="Nombre del producto (ej. Nachos con queso)" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 transition-all text-sm">
                
                <div class="flex gap-4">
                    <input type="number" placeholder="Precio ($)" class="w-1/2 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 transition-all text-sm">
                    <input type="text" value="MXN" disabled class="w-1/4 p-4 bg-slate-100 text-slate-400 rounded-2xl border border-slate-100 text-center font-bold text-sm">
                </div>

                <input type="text" placeholder="URL de la imagen (Link)" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 transition-all text-sm">
                
                <button type="button" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-md hover:bg-slate-800 transition-all text-sm uppercase tracking-wide">
                    Guardar Producto
                </button>
            </form>
        </section>

        <section>
            <h3 class="font-bold text-slate-900 mb-4 px-2">Mi Menú Activo</h3>
            
            <div class="space-y-4">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex gap-4 items-center">
                    <div class="w-20 h-20 bg-slate-100 rounded-2xl overflow-hidden shrink-0">
                        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500&q=80" alt="Hamburguesa" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-900 leading-tight">Hamburguesa Clásica</h4>
                        <p class="text-orange-500 font-black mt-1">$120 MXN</p>
                    </div>
                    <button class="w-10 h-10 rounded-full bg-red-50 text-red-500 font-bold flex items-center justify-center hover:bg-red-100">
                        X
                    </button>
                </div>

                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex gap-4 items-center">
                    <div class="w-20 h-20 bg-slate-100 rounded-2xl overflow-hidden shrink-0">
                        <img src="https://images.unsplash.com/photo-1585553616435-2dc0a54e271d?w=500&q=80" alt="Tacos" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-900 leading-tight">Orden de Tacos (3)</h4>
                        <p class="text-orange-500 font-black mt-1">$85 MXN</p>
                    </div>
                    <button class="w-10 h-10 rounded-full bg-red-50 text-red-500 font-bold flex items-center justify-center hover:bg-red-100">
                        X
                    </button>
                </div>
            </div>
        </section>

    </main>
</body>
</html>
