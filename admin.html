<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Panel Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .new-order-anim { animation: pulse-border 2s infinite; }
        @keyframes pulse-border {
            0% { border-color: #f97316; shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            70% { border-color: #fb923c; shadow: 0 0 0 10px rgba(249, 115, 22, 0); }
            100% { border-color: #f97316; shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="flex justify-between items-center relative max-w-md mx-auto">
            <div class="w-10">
                <span id="status-dot" class="w-2 h-2 bg-green-500 rounded-full block" title="Conectado en vivo"></span>
            </div>
            <div class="absolute left-1/2 transform -translate-x-1/2 flex items-center gap-2">
                <h1 class="text-lg font-black tracking-tighter text-slate-900">serve<span class="text-orange-500">yourself</span></h1>
            </div>

            <div class="relative">
                <button onclick="toggleAdminMenu()" class="w-10 h-10 bg-slate-900 text-white rounded-full flex items-center justify-center font-black">🏪</button>
                <div id="admin-menu" class="hidden absolute top-14 right-0 w-56 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden fade-in-down">
                    <div class="p-4 border-b border-slate-50 bg-slate-50/50">
                        <p id="biz-name-display" class="text-sm font-black text-slate-900 italic">Cargando...</p>
                        <p id="admin-email-display" class="text-xs font-medium text-slate-500">...</p>
                    </div>
                    <div class="flex flex-col py-2">
                        <button onclick="mostrarSeccion('pedidos')" class="text-left px-5 py-2.5 text-sm font-black text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors">📦 Pedidos Activos</button>
                        <button onclick="mostrarSeccion('productos')" class="text-left px-5 py-2.5 text-sm font-black text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors">🍔 Editar Menú</button>
                    </div>
                    <div class="p-2 bg-slate-50 border-t border-slate-100">
                        <button onclick="cerrarSesion()" class="block text-center w-full py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors">Cerrar sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6 space-y-8">
        
        <section id="view-pedidos" class="space-y-6">
            <div>
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Panel de Órdenes</h2>
                <p id="live-indicator" class="text-orange-500 text-[10px] font-black uppercase tracking-widest mt-1">● Escuchando pedidos en vivo</p>
            </div>
            <div id="lista-pedidos" class="space-y-6"></div>
        </section>

        <section id="view-productos" class="hidden space-y-8">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Gestión de Menú</h2>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                <form id="add-product-form" class="space-y-4">
                    <input type="text" id="prod-name" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none text-sm font-bold" required>
                    <input type="number" id="prod-price" placeholder="Precio" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none text-sm font-bold" required>
                    <input type="text" id="prod-category" placeholder="Categoría" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none text-sm font-bold" required>
                    <input type="url" id="prod-img" placeholder="URL imagen" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none text-sm font-bold">
                    <button type="submit" id="btn-save-prod" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest hover:bg-orange-500 transition-colors">Agregar</button>
                </form>
            </div>
            <div id="lista-menu-admin" class="space-y-3"></div>
        </section>
    </main>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://spbgledcjwtqmlqdlpyx.supabase.co', 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY');
        let currentRestaurantId = null;

        function toggleAdminMenu() { document.getElementById('admin-menu').classList.toggle('hidden'); }
        
        function mostrarSeccion(seccion) {
            document.getElementById('view-pedidos').classList.toggle('hidden', seccion !== 'pedidos');
            document.getElementById('view-productos').classList.toggle('hidden', seccion !== 'productos');
            toggleAdminMenu();
        }

        async function inicializarAdmin() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }

            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            currentRestaurantId = user.id;
            document.getElementById('biz-name-display').innerText = profile.business_name;
            document.getElementById('admin-email-display').innerText = user.email;

            cargarPedidos();
            cargarProductos();
            activarRealtime();
        }

        function activarRealtime() {
            _supabase
                .channel('cambios-pedidos')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'orders',
                    filter: `restaurant_id=eq.${currentRestaurantId}` 
                }, payload => {
                    console.log('¡Nuevo pedido recibido!', payload);
                    document.getElementById('notif-sound').play();
                    cargarPedidos();
                })
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'orders',
                    filter: `restaurant_id=eq.${currentRestaurantId}` 
                }, () => cargarPedidos())
                .subscribe();
        }

        async function cargarPedidos() {
            const container = document.getElementById('lista-pedidos');
            const { data: orders } = await _supabase.from('orders')
                .select('*').eq('restaurant_id', currentRestaurantId).order('created_at', { ascending: false });

            if (!orders || orders.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-30 italic text-xs font-black uppercase tracking-widest">Esperando órdenes...</div>`;
                return;
            }

            container.innerHTML = orders.map(o => {
                const esPendiente = o.status === 'pendiente';
                return `
                    <div class="bg-white p-5 rounded-[2.5rem] border-2 ${esPendiente ? 'border-orange-500 shadow-xl shadow-orange-100 new-order-anim' : 'border-slate-100 opacity-60'}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-black px-3 py-1 rounded-full uppercase ${esPendiente ? 'bg-orange-500 text-white' : 'bg-slate-100 text-slate-400'}">
                                ${esPendiente ? 'NUEVA ORDEN' : 'ENTREGADO'}
                            </span>
                            <span class="text-[10px] font-bold text-slate-400">${new Date(o.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        </div>
                        <div class="space-y-2 mb-4">
                            ${o.items.map(i => `<p class="text-sm font-bold text-slate-800"><span class="text-orange-500">${i.qty}x</span> ${i.nombre}</p>`).join('')}
                        </div>
                        ${o.notes ? `<div class="bg-orange-50 p-3 rounded-2xl mb-4 border border-orange-100 text-[11px] font-semibold text-slate-600 italic">"${o.notes}"</div>` : ''}
                        <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                            <p class="text-lg font-black text-slate-900">$${o.total}</p>
                            <div class="flex gap-2">
                                ${esPendiente ? `<button onclick="cambiarEstado('${o.id}', 'listo')" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest">Listo</button>` 
                                : `<button onclick="eliminarPedido('${o.id}')" class="bg-red-50 text-red-500 p-3 rounded-2xl">🗑️</button>`}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function cambiarEstado(id, status) { await _supabase.from('orders').update({ status }).eq('id', id); }
        async function eliminarPedido(id) { if(confirm("¿Borrar?")) await _supabase.from('orders').delete().eq('id', id); }

        async function cargarProductos() {
            const { data: prods } = await _supabase.from('products').select('*').eq('restaurant_id', currentRestaurantId).order('created_at', { ascending: false });
            document.getElementById('lista-menu-admin').innerHTML = prods.map(p => `
                <div class="bg-white p-4 rounded-3xl border border-slate-100 flex items-center justify-between ${!p.is_available ? 'opacity-50' : ''}">
                    <div class="flex items-center gap-4">
                        <img src="${p.image_url || 'https://via.placeholder.com/50'}" class="w-10 h-10 rounded-xl object-cover">
                        <div>
                            <h4 class="font-bold text-slate-900 text-sm">${p.name}</h4>
                            <p class="text-orange-500 font-black text-xs">$${p.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${p.is_available ? 'checked' : ''} onchange="toggleDisponibilidad('${p.id}', ${p.is_available})" class="w-4 h-4 accent-green-500">
                        <button onclick="eliminarProducto('${p.id}')" class="text-slate-300">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.toggleDisponibilidad = async (id, actual) => { await _supabase.from('products').update({ is_available: !actual }).eq('id', id); cargarProductos(); };
        window.eliminarProducto = async (id) => { if (confirm("¿Borrar?")) { await _supabase.from('products').delete().eq('id', id); cargarProductos(); } };

        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await _supabase.from('products').insert([{
                restaurant_id: currentRestaurantId,
                name: document.getElementById('prod-name').value,
                price: document.getElementById('prod-price').value,
                category: document.getElementById('prod-category').value,
                image_url: document.getElementById('prod-img').value || null,
                is_available: true
            }]);
            document.getElementById('add-product-form').reset();
            cargarProductos();
        });

        async function cerrarSesion() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        inicializarAdmin();
    </script>
</body>
</html>
