<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dot { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="flex justify-between items-center relative max-w-md mx-auto">
            <div class="w-10"></div>
            <div class="absolute left-1/2 transform -translate-x-1/2 flex items-center gap-2">
                <h1 class="text-lg font-black tracking-tighter text-slate-900">serve<span class="text-orange-500">yourself</span></h1>
            </div>

            <div class="relative">
                <button onclick="toggleAdminMenu()" class="w-10 h-10 bg-slate-900 text-white rounded-full flex items-center justify-center font-black transition-colors">
                    🏪
                </button>

                <div id="admin-menu" class="hidden absolute top-14 right-0 w-56 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden fade-in-down">
                    <div class="p-4 border-b border-slate-50 bg-slate-50/50">
                        <p id="biz-name-display" class="text-sm font-black text-slate-900 italic">Cargando...</p>
                        <p id="admin-email-display" class="text-xs font-medium text-slate-500">...</p>
                    </div>
                    <div class="flex flex-col py-2">
                        <button onclick="mostrarSeccion('pedidos')" class="text-left px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors font-black">📦 Pedidos recibidos</button>
                        <button onclick="mostrarSeccion('productos')" class="text-left px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors font-black">🍔 Gestionar Menú</button>
                        <button onclick="window.location.href='menu.html'" class="text-left px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors">🌐 Ver vista cliente</button>
                    </div>
                    <div class="p-2 bg-slate-50 border-t border-slate-100">
                        <button onclick="cerrarSesion()" class="block text-center w-full py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors">Cerrar sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6 space-y-8">
        
        <section id="view-pedidos" class="space-y-6">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-black text-slate-900 tracking-tight">Pedidos</h2>
                    <p class="text-slate-500 text-sm font-medium">Ordenes de los últimos 15 días.</p>
                </div>
                <button onclick="cargarPedidos()" class="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center border border-slate-100">🔄</button>
            </div>
            <div id="lista-pedidos" class="space-y-4">
                <p class="text-center text-slate-400 text-xs py-10 italic">Buscando nuevos pedidos...</p>
            </div>
        </section>

        <section id="view-productos" class="hidden space-y-8">
            <div>
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Mi Catálogo</h2>
                <p class="text-slate-500 text-sm font-medium">Añade o edita tus productos.</p>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-900 mb-4 text-sm uppercase tracking-wider">Añadir Producto</h3>
                <form id="add-product-form" class="space-y-4">
                    <input type="text" id="prod-name" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none text-sm font-medium" required>
                    <input type="number" id="prod-price" placeholder="Precio" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none text-sm font-medium" required>
                    <input type="text" id="prod-category" placeholder="Categoría" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none text-sm font-medium" required>
                    <input type="url" id="prod-img" placeholder="URL imagen (opcional)" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none text-sm font-medium">
                    <button type="submit" id="btn-save-prod" class="w-full bg-slate-900 text-white font-black py-4 rounded-[1.5rem] uppercase text-xs tracking-widest transition-all hover:bg-orange-500">Guardar en Menú</button>
                </form>
            </div>

            <div id="lista-menu-admin" class="space-y-4"></div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://spbgledcjwtqmlqdlpyx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentRestaurantId = null;

        function toggleAdminMenu() { document.getElementById('admin-menu').classList.toggle('hidden'); }
        
        function mostrarSeccion(seccion) {
            document.getElementById('view-pedidos').classList.toggle('hidden', seccion !== 'pedidos');
            document.getElementById('view-productos').classList.toggle('hidden', seccion !== 'productos');
            toggleAdminMenu();
        }

        async function inicializarAdmin() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }

            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            if (profile.role !== 'negocio') { window.location.href = 'menu.html'; return; }

            currentRestaurantId = user.id;
            document.getElementById('biz-name-display').innerText = profile.business_name;
            document.getElementById('admin-email-display').innerText = user.email;

            // Limpieza automática de pedidos antiguos (15 días)
            const fechaLimite = new Date();
            fechaLimite.setDate(fechaLimite.getDate() - 15);
            await _supabase.from('orders').delete().lt('created_at', fechaLimite.toISOString());

            cargarPedidos();
            cargarProductos();
        }

        async function cargarPedidos() {
            const container = document.getElementById('lista-pedidos');
            const { data: orders, error } = await _supabase.from('orders')
                .select('*').eq('restaurant_id', currentRestaurantId).order('created_at', { ascending: false });

            if (error || !orders.length) {
                container.innerHTML = `<p class="text-center text-slate-400 text-xs py-10 italic">No hay pedidos registrados.</p>`;
                return;
            }

            container.innerHTML = orders.map(o => `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm space-y-4">
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-black uppercase px-2 py-1 rounded-lg ${o.status === 'pendiente' ? 'bg-orange-500 text-white' : 'bg-slate-100 text-slate-400'}">${o.status}</span>
                        <p class="font-black text-lg text-slate-900">$${o.total}</p>
                    </div>
                    <div class="space-y-2 border-y border-slate-50 py-3">
                        ${o.items.map(i => `<div class="flex justify-between text-sm font-bold text-slate-700"><span>${i.qty}x ${i.nombre}</span></div>`).join('')}
                    </div>
                    ${o.notes ? `<div class="bg-slate-50 p-3 rounded-xl text-[11px] text-slate-500 italic">Nota: ${o.notes}</div>` : ''}
                    <div class="flex gap-2 pt-2">
                        <button onclick="cambiarEstado('${o.id}', 'listo')" class="flex-1 py-3 bg-slate-900 text-white text-[10px] font-black rounded-xl uppercase">Marcar Listo</button>
                        <button onclick="eliminarPedido('${o.id}')" class="px-4 py-3 bg-red-50 text-red-500 rounded-xl">🗑️</button>
                    </div>
                    <p class="text-[9px] text-slate-300 font-bold uppercase text-right">${new Date(o.created_at).toLocaleString()}</p>
                </div>
            `).join('');
        }

        async function cambiarEstado(id, status) {
            await _supabase.from('orders').update({ status }).eq('id', id);
            cargarPedidos();
        }

        async function eliminarPedido(id) {
            if(confirm("¿Eliminar pedido del registro?")) {
                await _supabase.from('orders').delete().eq('id', id);
                cargarPedidos();
            }
        }

        async function cargarProductos() {
            const { data: prods } = await _supabase.from('products').select('*').eq('restaurant_id', currentRestaurantId).order('created_at', { ascending: false });
            const contenedor = document.getElementById('lista-menu-admin');
            
            contenedor.innerHTML = prods.map(p => `
                <div class="bg-white p-4 rounded-3xl border border-slate-100 flex items-center justify-between shadow-sm ${!p.is_available ? 'opacity-50 grayscale' : ''}">
                    <div class="flex items-center gap-4">
                        <img src="${p.image_url || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-xl object-cover">
                        <div>
                            <h4 class="font-bold text-slate-900 text-sm">${p.name}</h4>
                            <p class="text-orange-500 font-black text-xs">$${p.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" ${p.is_available ? 'checked' : ''} onchange="toggleDisponibilidad('${p.id}', ${p.is_available})">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-green-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                        </label>
                        <button onclick="eliminarProducto('${p.id}')" class="text-slate-300">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.toggleDisponibilidad = async (id, actual) => {
            await _supabase.from('products').update({ is_available: !actual }).eq('id', id);
            cargarProductos();
        };

        window.eliminarProducto = async (id) => {
            if (confirm("¿Borrar producto?")) {
                await _supabase.from('products').delete().eq('id', id);
                cargarProductos();
            }
        };

        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save-prod');
            btn.disabled = true;
            await _supabase.from('products').insert([{
                restaurant_id: currentRestaurantId,
                name: document.getElementById('prod-name').value,
                price: document.getElementById('prod-price').value,
                category: document.getElementById('prod-category').value,
                image_url: document.getElementById('prod-img').value || null,
                is_available: true
            }]);
            document.getElementById('add-product-form').reset();
            cargarProductos();
            btn.disabled = false;
        });

        async function cerrarSesion() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        inicializarAdmin();
    </script>
</body>
</html>
