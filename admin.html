<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serveyourself | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="flex justify-between items-center relative max-w-md mx-auto">
            <div class="w-10"></div>
            <div class="absolute left-1/2 transform -translate-x-1/2 flex items-center gap-2">
                <h1 class="text-lg font-black tracking-tighter text-slate-900">serve<span class="text-orange-500">yourself</span></h1>
            </div>

            <div class="relative">
                <button onclick="toggleAdminMenu()" class="w-10 h-10 bg-slate-900 text-white rounded-full flex items-center justify-center font-black transition-colors">
                    🏪
                </button>

                <div id="admin-menu" class="hidden absolute top-14 right-0 w-56 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden fade-in-down">
                    <div class="p-4 border-b border-slate-50 bg-slate-50/50">
                        <p id="biz-name-display" class="text-sm font-black text-slate-900 italic">Cargando...</p>
                        <p id="admin-email-display" class="text-xs font-medium text-slate-500">...</p>
                    </div>
                    <div class="flex flex-col py-2">
                        <button class="text-left px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors">📦 Pedidos recibidos</button>
                        <button onclick="window.location.href='menu.html'" class="text-left px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-orange-500 transition-colors">🌐 Ver vista cliente</button>
                    </div>
                    <div class="p-2 bg-slate-50 border-t border-slate-100">
                        <button onclick="cerrarSesion()" class="block text-center w-full py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors">Cerrar sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6 space-y-8">
        <div>
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Panel de Control</h2>
            <p class="text-slate-500 text-sm font-medium">Gestiona tu catálogo de productos.</p>
        </div>

        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-900 mb-4 flex items-center gap-2 text-sm uppercase tracking-wider">
                <span class="text-orange-500 font-black">+</span> Añadir Producto
            </h3>
            <form id="add-product-form" class="space-y-4">
                <input type="text" id="prod-name" placeholder="Nombre (ej. Pizza Margarita)" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium" required>
                
                <div class="flex gap-4">
                    <input type="number" id="prod-price" placeholder="Precio" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium" required>
                </div>

                <input type="text" id="prod-category" placeholder="Categoría (ej. Entradas, Bebidas)" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium" required>
                
                <input type="url" id="prod-img" placeholder="URL de la imagen (opcional)" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-orange-500 text-sm font-medium">
                
                <button type="submit" id="btn-save-prod" class="w-full bg-slate-900 text-white font-black py-4 rounded-[1.5rem] shadow-lg uppercase text-xs tracking-[0.2em] hover:bg-orange-500 transition-all">
                    Guardar en Menú
                </button>
            </form>
        </section>

        <section>
            <h3 class="font-bold text-slate-900 mb-4 px-2 text-sm uppercase tracking-wider">Mi Menú Activo</h3>
            <div id="lista-menu-admin" class="space-y-4">
                <p class="text-center text-slate-400 text-xs py-10 animate-pulse">Cargando productos...</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://spbgledcjwtqmlqdlpyx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Uf9mS1Ev7fDYIld8PVCL5g_BwenGNXY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentRestaurantId = null;

        function toggleAdminMenu() {
            document.getElementById('admin-menu').classList.toggle('hidden');
        }

        async function cerrarSesion() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        // 1. VERIFICAR PERFIL Y CARGAR PRODUCTOS
        async function inicializarAdmin() {
            const { data: { user } } = await _supabase.auth.getUser();

            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const { data: profile, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (error || profile.role !== 'negocio') {
                alert("Acceso denegado.");
                window.location.href = 'menu.html';
                return;
            }

            currentRestaurantId = user.id;
            document.getElementById('biz-name-display').innerText = profile.business_name || "Mi Negocio";
            document.getElementById('admin-email-display').innerText = user.email;

            cargarProductos();
        }

        // 2. GUARDAR PRODUCTO EN SUPABASE
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save-prod');
            
            const name = document.getElementById('prod-name').value.trim();
            const price = document.getElementById('prod-price').value;
            const category = document.getElementById('prod-category').value.trim();
            const image_url = document.getElementById('prod-img').value.trim();

            btn.disabled = true;
            btn.innerText = "GUARDANDO...";

            try {
                const { error } = await _supabase
                    .from('products')
                    .insert([{
                        restaurant_id: currentRestaurantId,
                        name,
                        price,
                        category,
                        image_url: image_url || null
                    }]);

                if (error) throw error;

                alert("¡Producto añadido con éxito!");
                document.getElementById('add-product-form').reset();
                cargarProductos(); // Recargar lista
            } catch (err) {
                alert("Error al guardar: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar en Menú";
            }
        });

        // 3. OBTENER Y MOSTRAR PRODUCTOS
        async function cargarProductos() {
            const contenedor = document.getElementById('lista-menu-admin');
            
            const { data: productos, error } = await _supabase
                .from('products')
                .select('*')
                .eq('restaurant_id', currentRestaurantId)
                .order('created_at', { ascending: false });

            if (error) {
                contenedor.innerHTML = `<p class="text-red-500 text-xs">Error al cargar el menú.</p>`;
                return;
            }

            if (productos.length === 0) {
                contenedor.innerHTML = `<p class="text-center text-slate-400 text-xs py-10 italic">Aún no tienes productos. ¡Añade el primero!</p>`;
                return;
            }

            contenedor.innerHTML = '';
            productos.forEach(prod => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-3xl border border-slate-100 flex items-center justify-between shadow-sm";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        ${prod.image_url 
                            ? `<img src="${prod.image_url}" class="w-12 h-12 rounded-xl object-cover">` 
                            : `<div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-xl">🍲</div>`}
                        <div>
                            <h4 class="font-bold text-slate-900 text-sm">${prod.name}</h4>
                            <p class="text-orange-500 font-black text-xs">$${prod.price} MXN</p>
                            <span class="text-[9px] uppercase tracking-widest font-bold text-slate-400">${prod.category}</span>
                        </div>
                    </div>
                    <button onclick="eliminarProducto('${prod.id}')" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                        🗑️
                    </button>
                `;
                contenedor.appendChild(div);
            });
        }

        // 4. ELIMINAR PRODUCTO
        window.eliminarProducto = async (id) => {
            if (!confirm("¿Seguro que quieres eliminar este producto?")) return;
            
            const { error } = await _supabase
                .from('products')
                .delete()
                .eq('id', id);

            if (error) alert("No se pudo eliminar.");
            else cargarProductos();
        };

        inicializarAdmin();
    </script>
</body>
</html>
